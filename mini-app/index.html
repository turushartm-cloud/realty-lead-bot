<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Realty CRM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div id="app">
        <header class="app-header">
            <div class="header-left">
                <div class="logo">🏠</div>
                <div class="brand">
                    <h1>Realty CRM</h1>
                    <span class="status online">● Online</span>
                </div>
            </div>
            <div class="header-right">
                <button class="icon-btn" id="searchBtn">🔍</button>
                <button class="icon-btn" id="filterBtn">⚙️</button>
                <div class="avatar" id="userAvatar">👤</div>
            </div>
        </header>

        <div class="search-bar" id="searchBar" style="display:none;">
            <input type="text" placeholder="Поиск по лидам..." id="searchInput">
            <button class="close-search" id="closeSearch">✕</button>
        </div>

        <section class="stats-grid">
            <div class="stat-card primary">
                <div class="stat-icon">📊</div>
                <div class="stat-info">
                    <span class="stat-value" id="totalLeads">0</span>
                    <span class="stat-label">Всего лидов</span>
                </div>
            </div>
            <div class="stat-card success">
                <div class="stat-icon">🆕</div>
                <div class="stat-info">
                    <span class="stat-value" id="newLeads">0</span>
                    <span class="stat-label">Новые (24ч)</span>
                </div>
            </div>
            <div class="stat-card warning">
                <div class="stat-icon">💰</div>
                <div class="stat-info">
                    <span class="stat-value" id="conversionRate">0%</span>
                    <span class="stat-label">Конверсия</span>
                </div>
            </div>
            <div class="stat-card info">
                <div class="stat-icon">🤖</div>
                <div class="stat-info">
                    <span class="stat-value" id="avgScore">0.0</span>
                    <span class="stat-label">AI Score</span>
                </div>
            </div>
        </section>

        <section class="quick-actions">
            <button class="action-btn" onclick="filterByStatus('new')">
                <span class="action-icon">🆕</span>
                <span>Новые</span>
            </button>
            <button class="action-btn" onclick="filterByStatus('contacted')">
                <span class="action-icon">📞</span>
                <span>В работе</span>
            </button>
            <button class="action-btn" onclick="filterByStatus('converted')">
                <span class="action-icon">💰</span>
                <span>Конвертированы</span>
            </button>
            <button class="action-btn" onclick="exportLeads()">
                <span class="action-icon">📤</span>
                <span>Экспорт</span>
            </button>
        </section>

        <section class="leads-section">
            <div class="section-header">
                <h2>📋 Последние лиды</h2>
                <button class="view-all" onclick="showAllLeads()">Все →</button>
            </div>
            <div class="leads-list" id="leadsList">
                <div class="loading">Загрузка...</div>
            </div>
        </section>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item active">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Главная</span>
            </a>
            <a href="leads.html" class="nav-item">
                <span class="nav-icon">📋</span>
                <span class="nav-label">Лиды</span>
            </a>
            <a href="analytics.html" class="nav-item">
                <span class="nav-icon">📊</span>
                <span class="nav-label">Аналитика</span>
            </a>
            <a href="settings.html" class="nav-item">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label">Настройки</span>
            </a>
        </nav>
    </div>

    <div class="modal" id="leadModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Детали лида</h3>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="takeLead()">✅ Взять в работу</button>
                <button class="btn btn-secondary" onclick="addNote()">📝 Заметка</button>
                <button class="btn btn-success" onclick="syncToCRM()">📤 В CRM</button>
            </div>
        </div>
    </div>

    <script src="js/telegram.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
